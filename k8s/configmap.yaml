apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-job-helper-config
  namespace: ai-job-helper
data:
  # 应用配置
  ENVIRONMENT: "production"
  DEBUG: "False"
  
  # MySQL配置
  MYSQL_HOST: "mysql-service"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "job_helper"
  
  # Redis配置
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # MinIO配置
  MINIO_ENDPOINT: "minio-service:9000"
  MINIO_BUCKET: "job-helper"
  MINIO_SECURE: "false"
  
  # Streamlit配置
  STREAMLIT_SERVER_PORT: "8501"
  STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
  STREAMLIT_SERVER_HEADLESS: "true"
  
  # Prometheus监控配置
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PORT: "9090"
  
  # 日志配置
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
