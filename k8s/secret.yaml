apiVersion: v1
kind: Secret
metadata:
  name: ai-job-helper-secret
  namespace: ai-job-helper
type: Opaque
stringData:
  # MySQL密码
  MYSQL_ROOT_PASSWORD: "rootpassword"
  MYSQL_USER: "job_helper"
  MYSQL_PASSWORD: "password"
  
  # Redis密码（如果需要）
  REDIS_PASSWORD: ""
  
  # MinIO访问密钥
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minioadmin"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
  
  # GLM-4 API密钥（请替换为实际密钥）
  GLM4_API_KEY: "your-api-key-here"
  
  # 数据库连接字符串
  DATABASE_URL: "mysql+pymysql://job_helper:password@mysql-service:3306/job_helper"
  REDIS_URL: "redis://redis-service:6379/0"
